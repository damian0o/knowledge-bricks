<!DOCTYPE html><html lang="en" data-astro-cid-oy34yelw> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Knowledge Graph — knowledge-bricks</title><style>:root{--bg: #0f1115;--panel: #171a21;--fg: #e6e8ec;--border: #262b35;--accent: #6ea8fe}[data-astro-cid-oy34yelw]{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif}header[data-astro-cid-oy34yelw].site{display:flex;gap:1.5rem;align-items:center;padding:.75rem 1.5rem;border-bottom:1px solid var(--border);background:var(--panel);position:relative;z-index:10}header[data-astro-cid-oy34yelw].site .brand[data-astro-cid-oy34yelw]{font-weight:700}header[data-astro-cid-oy34yelw].site nav[data-astro-cid-oy34yelw] a[data-astro-cid-oy34yelw]{margin-right:1rem;text-decoration:none;color:var(--accent)}#cy[data-astro-cid-oy34yelw]{position:absolute;inset:56px 0 0}#legend[data-astro-cid-oy34yelw]{position:absolute;top:72px;right:16px;z-index:20;background:#171a21eb;border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;font-size:.78rem;max-width:240px}#legend[data-astro-cid-oy34yelw] h4[data-astro-cid-oy34yelw]{margin:0 0 .4rem;font-size:.8rem}#legend[data-astro-cid-oy34yelw] .row[data-astro-cid-oy34yelw]{display:flex;align-items:center;gap:.5rem;margin:.2rem 0}#legend[data-astro-cid-oy34yelw] .dot[data-astro-cid-oy34yelw]{width:12px;height:12px;border-radius:50%;flex:none}#legend[data-astro-cid-oy34yelw] .line[data-astro-cid-oy34yelw]{width:22px;height:0;flex:none}#legend[data-astro-cid-oy34yelw] .section[data-astro-cid-oy34yelw]{margin-top:.6rem;color:#9aa3b2;text-transform:uppercase;font-size:.66rem;letter-spacing:.05em}
</style></head> <body data-astro-cid-oy34yelw> <header class="site" data-astro-cid-oy34yelw> <span class="brand" data-astro-cid-oy34yelw>knowledge-bricks</span> <nav data-astro-cid-oy34yelw> <a href="/knowledge-bricks/" data-astro-cid-oy34yelw>Home</a> <a href="/knowledge-bricks/graph/" data-astro-cid-oy34yelw>Graph</a> </nav> </header> <div id="cy" data-astro-cid-oy34yelw></div> <div id="legend" data-astro-cid-oy34yelw></div> <script>(function(){const graphUrl = "/knowledge-bricks/graph.json";
const baseSlash = "/knowledge-bricks/";

      import("cytoscape").then(async ({ default: cytoscape }) => {
        const res = await fetch(graphUrl);
        const graph = await res.json();

        // Distinct palette per cluster (incl. eos).
        const clusterColors = {
          eos: "#ff6b6b",
          ancient: "#ffd166",
          "medieval-rationalist": "#06d6a0",
          "empiricism-kant": "#118ab2",
          "nineteenth-twentieth": "#9b5de5",
          poststructuralist: "#f15bb5",
          "physics-of-reality": "#00bbf9",
        };
        const fallback = "#8d99ae";
        function colorFor(cluster) {
          return clusterColors[cluster] || fallback;
        }

        const elements = [];
        for (const n of graph.nodes) {
          elements.push({
            data: {
              id: n.id,
              label: n.label,
              url: n.url,
              cluster: n.cluster,
              color: colorFor(n.cluster),
            },
          });
        }
        for (const e of graph.edges) {
          elements.push({
            data: {
              id: `${e.source}__${e.target}__${e.kind}`,
              source: e.source,
              target: e.target,
              kind: e.kind,
            },
          });
        }

        const cy = cytoscape({
          container: document.getElementById("cy"),
          elements,
          style: [
            {
              selector: "node",
              style: {
                "background-color": "data(color)",
                label: "data(label)",
                color: "#e6e8ec",
                "font-size": "8px",
                "text-wrap": "wrap",
                "text-max-width": "90px",
                "text-valign": "bottom",
                "text-halign": "center",
                width: 18,
                height: 18,
              },
            },
            {
              selector: "edge",
              style: {
                width: 1.2,
                "line-color": "#3a4250",
                "curve-style": "bezier",
                "target-arrow-shape": "triangle",
                "target-arrow-color": "#3a4250",
                "arrow-scale": 0.7,
                opacity: 0.7,
              },
            },
            {
              selector: 'edge[kind = "grounding"]',
              style: {
                width: 3,
                "line-color": "#ffb454",
                "target-arrow-color": "#ffb454",
                opacity: 1,
              },
            },
            {
              selector: 'edge[kind = "structural"]',
              style: {
                "line-style": "dashed",
                "line-color": "#06d6a0",
                "target-arrow-color": "#06d6a0",
              },
            },
            {
              selector: "node:selected",
              style: { "border-width": 3, "border-color": "#ffffff" },
            },
          ],
          layout: {
            name: "cose",
            animate: false,
            nodeRepulsion: 8000,
            idealEdgeLength: 90,
            gravity: 0.3,
            padding: 30,
          },
        });

        cy.on("tap", "node", (evt) => {
          const url = evt.target.data("url");
          if (url) {
            const b = baseSlash;
            window.location.href = b + url.replace(/^\//, "");
          }
        });

        // Build legend.
        const legend = document.getElementById("legend");
        const usedClusters = [...new Set(graph.nodes.map((n) => n.cluster))].sort();
        let html = "<h4>Clusters</h4>";
        for (const c of usedClusters) {
          html += `<div class="row"><span class="dot" style="background:${colorFor(c)}"></span>${c}</div>`;
        }
        html += '<div class="section">Edge kinds</div>';
        html += '<div class="row"><span class="line" style="border-top:3px solid #ffb454"></span>grounding</div>';
        html += '<div class="row"><span class="line" style="border-top:2px dashed #06d6a0"></span>structural</div>';
        html += '<div class="row"><span class="line" style="border-top:1.2px solid #3a4250"></span>influence</div>';
        legend.innerHTML = html;
      });
    })();</script> </body> </html>
