name: Build and Deploy OKF Astro site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: tools/okf-to-astro
        run: npm ci

      - name: Build site
        working-directory: tools/okf-to-astro
        env:
          OKF_BASE: /knowledge-bricks/
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./tools/okf-to-astro/dist
          publish_branch: gh-pages
